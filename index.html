<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Enterprise | Premium Access</title>
    <!-- Font Awesome للأيقونات الفخمة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- ملف الـ CSS الخاص بنا -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>

    <!-- ⏳ شاشة التحميل الذكية (Loading Screen) -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader">
            <div class="spinner"></div>
            <p class="loading-text">Securing Connection...</p>
        </div>
    </div>

    <!-- 🌌 الخلفية الفخمة المتحركة -->
    <div class="bg-overlay"></div>

    <!-- 🔒 صندوق تسجيل الدخول الفاخر (Login Card) -->
    <main class="login-container">
        <div class="login-card">
            <!-- اللوجو والهيدر -->
            <div class="login-header">
                <div class="logo-wrapper">
                    <i class="fa-solid fa-crown gold-glow"></i>
                </div>
                <h1>MOCHA ENTERPRISE</h1>
                <p class="subtitle">Private Investment Hub & Asset Management</p>
            </div>

            <!-- فورم الدخول -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="access-key">VIP ACCESS KEY</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key input-icon"></i>
                        <input 
                            type="password" 
                            id="access-key" 
                            placeholder="Enter your MPL access code..." 
                            required
                        >
                        <button type="button" id="toggle-password" onclick="togglePass()">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- رسالة الخطأ في حال الباسوورد غلط -->
                <div id="error-message" class="error-message">
                    <i class="fa-solid fa-triangle-exclamation"></i> Invalid Access Key. Try again.
                </div>

                <button type="submit" class="btn-submit">
                    <span>VERIFY ACCESS</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <!-- الفوتر الداخلي -->
            <div class="login-footer">
                <p>Authorized personnel only. All activities are logged.</p>
                <div class="mpl-badge">MPL Verified Ecosystem</div>
            </div>
        </div>
    </main>

    <!-- ملفات الـ JavaScript لتشغيل الحماية والتحميل -->
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
