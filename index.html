<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mocca Lovers</title>

    <meta name="description" content="Private Investor Portal">
    <meta name="theme-color" content="#0a0807">

    <link rel="icon" href="assets/img/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <main class="login-page">

        <section class="login-card">

            <div class="logo-circle">

                ☕

            </div>

            <span class="company-tag">
                MOCHA ENTERPRISE
            </span>

            <h1>
                Investor Portal
            </h1>

            <p>
                Private access for shareholders and founders.
            </p>

            <form id="loginForm">

                <input
                    id="password"
                    type="password"
                    placeholder="Verification Code"
                    autocomplete="off"
                    required>

                <button type="submit">

                    Verify Access

                </button>

            </form>

            <small id="errorMessage"></small>

        </section>

    </main>

    <script src="assets/js/login.js"></script>

</body>

</html>
