<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Enterprise | Premium Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    
    <style>
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0c0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen" class="loading-screen">
        <div class="loader">
            <div class="spinner"></div>
            <p class="loading-text">Securing Connection...</p>
        </div>
    </div>

    <div class="bg-overlay"></div>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <i class="fa-solid fa-crown gold-glow"></i>
                </div>
                <h1>MOCHA ENTERPRISE</h1>
                <p class="subtitle">Private Investment Hub & Asset Management</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="access-key">VIP ACCESS KEY</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key input-icon"></i>
                        <input 
                            type="password" 
                            id="access-key" 
                            placeholder="Enter your MPL access code..." 
                            required
                        >
                        <button type="button" id="toggle-password" onclick="togglePass()">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="error-message" style="display: none; color: #ff453a; margin: 10px 0; font-size: 0.9rem;">
                    <i class="fa-solid fa-triangle-exclamation"></i> Invalid Access Key. Try again.
                </div>

                <button type="submit" class="btn-submit">
                    <span>VERIFY ACCESS</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>Authorized personnel only. All activities are logged.</p>
                <div class="mpl-badge">MPL Verified Ecosystem</div>
            </div>
        </div>
    </main>

    <script>
        const BASE_URL = "https://docs.google.com/spreadsheets/d/11-u2UCKiW1VmYhm3X8MhD_f4PhyfdXi0DtJG41zdHT8/gviz/tq?tqx=out:json";

        function hideLoader() {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.classList.add('fade-out');
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }
        }

        window.addEventListener('load', hideLoader);
        setTimeout(hideLoader, 1000);

        function togglePass() {
            const passInput = document.getElementById('access-key');
            const eyeIcon = document.querySelector('#toggle-password i');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passInput.type = "password";
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const codeInput = document.getElementById('access-key').value.trim();
            const errDiv = document.getElementById('error-message');
            const btn = document.querySelector('.btn-submit span');
            
            errDiv.style.display = 'none';
            btn.innerText = "AUTHENTICATING...";

            // الكود العام الموحد (MPL2026)
            if(codeInput === "MPL2026") { 
                localStorage.setItem('mocha_auth', 'true');
                localStorage.setItem('user_role', 'public');
                btn.innerText = "ACCESS GRANTED";
                window.location.href = 'dashboard.html';
                return;
            }

            try {
                // سحب بيانات الملاك والأدمن من شيت Investors
                const response = await fetch(BASE_URL + "&sheet=Investors&nocache=" + new Date().getTime());
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                let authUser = null;

                // الفحص والتحقق من الأكواد
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row && row.c && row.c[2]) {
                        const sheetCode = row.c[2].v ? row.c[2].v.toString().trim() : "";
                        
                        if (sheetCode === codeInput) {
                            // 🔍 إذا كان الكود في الصف الثالث (i = 2 تعني الصف الثالث لأن العد يبدأ من 0)
                            // وبما أننا نتخطى الهيدر فـ i = 2 هي بالضبط الخلية C3 في الشيت
                            if (i === 2) {
                                authUser = {
                                    role: 'admin',
                                    name: 'System Admin',
                                    shares: 0
                                };
                            } else {
                                authUser = {
                                    role: 'investor',
                                    name: row.c[0] ? row.c[0].v : "Investor",
                                    shares: row.c[1] ? parseFloat(row.c[1].v || 0) : 0
                                };
                            }
                            break;
                        }
                    }
                }

                if (authUser) {
                    // تخزين البيانات والصلاحية المحددة بناءً على مكان الكود في الشيت
                    localStorage.setItem('mocha_auth', 'true');
                    localStorage.setItem('user_role', authUser.role);
                    localStorage.setItem('investor_name', authUser.name);
                    localStorage.setItem('investor_shares', authUser.shares);
                    
                    btn.innerText = "ACCESS GRANTED";
                    window.location.href = 'dashboard.html';
                } else {
                    btn.innerText = "VERIFY ACCESS";
                    errDiv.style.display = 'block';
                }
            } catch (err) {
                console.error("Auth System Error:", err);
                btn.innerText = "VERIFY ACCESS";
                alert("❌ حدث خطأ أثناء الاتصال بقاعدة البيانات.");
            }
        }
    </script>
</body>
</html>
