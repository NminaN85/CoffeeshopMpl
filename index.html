<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Enterprise | Premium Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>

    <div id="loading-screen" class="loading-screen">
        <div class="loader">
            <div class="spinner"></div>
            <p class="loading-text">Securing Connection...</p>
        </div>
    </div>

    <div class="bg-overlay"></div>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <i class="fa-solid fa-crown gold-glow"></i>
                </div>
                <h1>MOCHA ENTERPRISE</h1>
                <p class="subtitle">Private Investment Hub & Asset Management</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="access-key">VIP ACCESS KEY</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key input-icon"></i>
                        <input 
                            type="password" 
                            id="access-key" 
                            placeholder="Enter your MPL access code..." 
                            required
                        >
                        <button type="button" id="toggle-password" onclick="togglePass()">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="error-message" style="display: none; color: #ff453a; margin: 10px 0; font-size: 0.9rem;">
                    <i class="fa-solid fa-triangle-exclamation"></i> Invalid Access Key. Try again.
                </div>

                <button type="submit" class="btn-submit">
                    <span>VERIFY ACCESS</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>Authorized personnel only. All activities are logged.</p>
                <div class="mpl-badge">MPL Verified Ecosystem</div>
            </div>
        </div>
    </main>

                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }, 800);
            }
        });
