<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Hub | Executive Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0a0806;
            --panel-bg: #120e0a;
            --card-bg: rgba(26, 21, 16, 0.8);
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --border: rgba(212, 175, 55, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        .mobile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-bg);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }

        .mobile-header .brand {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .sidebar {
            width: 260px;
            background: var(--panel-bg);
            height: 100vh;
            position: fixed;
            top: 0; left: -260px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar.active {
            transform: translateX(260px);
        }

        .sidebar .brand {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar menu li {
            padding: 14px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .sidebar menu li.active, .sidebar menu li:hover {
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1500;
        }

        .sidebar-overlay.active { display: block; }

        .main-content {
            padding: 90px 20px 40px 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease-out; }

        .section-header { margin-bottom: 25px; }
        .section-header h2 { font-size: 1.6rem; font-weight: 700; color: #fff; }
        .section-header p { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 20px 15px;
            border-radius: 16px;
        }

        .metric-card h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .metric-card p { font-size: 1.3rem; font-weight: 700; }

        .gold-text { color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); }
        .green-text { color: #30d158; }
        .red-text { color: #ff453a; }

        .chart-container {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 20px;
            border-radius: 20px;
            height: 320px;
            position: relative;
        }

        .table-wrapper {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            overflow: hidden;
            margin-top: 15px;
        }

        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th, .custom-table td { padding: 14px 16px; text-align: left; font-size: 0.9rem; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        .custom-table th { background: rgba(212, 175, 55, 0.03); color: var(--gold); }
