<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Enterprise | Financial Dashboard</title>
    <!-- Font Awesome الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة الرسوم البيانية Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- ملفات الـ CSS الخارجي الخاص بك -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    
    <!-- حل مشكلة السكرول وإجبار الصفحة على التمرير لأسفل -->
    <style>
        html, body {
            height: auto !important;
            min-height: 100vh !important;
            overflow: auto !important;
            overflow-y: scroll !important;
        }
        
        .dashboard-container {
            height: auto !important;
            min-height: 100vh !important;
            overflow: visible !important;
            overflow-y: visible !important;
            padding-bottom: 60px !important;
        }

        .metrics-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important;
            gap: 20px !important;
            height: auto !important;
            overflow: visible !important;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="dashboard-container">
        
        <!-- الهيدر -->
        <header class="dash-header">
            <div class="brand">
                <i class="fa-solid fa-crown gold-text"></i>
                <div class="brand-text">
                    <h2>MOCHA HUB</h2>
                    <span id="last-update">🔄 System Initializing...</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="notification-bell">
                    <i class="fa-solid fa-bell"></i>
                    <span class="bell-dot"></span>
                </div>
                <button onclick="handleLogout()" class="btn-logout">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </header>

        <!-- 📊 شبكة كروت البيانات المتكاملة -->
        <section class="metrics-grid">
            
            <!-- 1. إجمالي الأرباح -->
            <div class="metric-card premium-glow">
                <div class="card-icon"><i class="fa-solid fa-chart-line-up"></i></div>
                <div class="card-info">
                    <h3>Total Profits</h3>
                    <p class="counter" id="total-profits">0.00 Gold</p>
                </div>
            </div>

            <!-- 2. الإيرادات -->
            <div class="metric-card">
                <div class="card-icon success"><i class="fa-solid fa-wallet"></i></div>
                <div class="card-info">
                    <h3>Revenues</h3>
                    <p class="counter" id="revenues">0.00 Gold</p>
                </div>
            </div>

            <!-- 3. المصروفات -->
            <div class="metric-card">
                <div class="card-icon danger"><i class="fa-solid fa-receipt"></i></div>
                <div class="card-info">
                    <h3>Expenses</h3>
                    <p class="counter" id="expenses">0.00 Gold</p>
                </div>
            </div>

            <!-- 4. عدد المستثمرين لايف من الشيت -->
            <div class="metric-card">
                <div class="card-icon info"><i class="fa-solid fa-users"></i></div>
                <div class="card-info">
                    <h3>Investors</h3>
                    <p id="investors-count">0</p>
                </div>
            </div>

            <!-- 5. قيمة السهم الثابتة -->
            <div class="metric-card share-value-card">
                <div class="card-icon gold"><i class="fa-solid fa-gem"></i></div>
                <div class="card-info">
                    <h3>Share Value</h3>
                    <p class="counter" id="share-value">30.00 Gold</p>
                </div>
            </div>

            <!-- 6. ربح السهم (Share Profit) -->
            <div class="metric-card premium-glow">
                <div class="card-icon"><i class="fa-solid fa-money-bill-trend-up"></i></div>
                <div class="card-info">
                    <h3>Share Profit</h3>
                    <p class="counter" id="share-profit">0.00 Gold</p>
                </div>
            </div>

            <!-- 7. صافي ربح السهم بالجولد بعد خصم الـ 7% -->
            <div class="metric-card premium-glow share-value-card">
                <div class="card-icon"><i class="fa-solid fa-coins"></i></div>
                <div class="card-info">
                    <h3>Net Share Profit (-7%)</h3>
                    <p class="counter" id="net-share-profit">0.00 Gold</p>
                </div>
            </div>

            <!-- 8. حالة المزامنة والسيستم -->
            <div class="metric-card" style="opacity: 0.7;">
                <div class="card-icon info"><i class="fa-solid fa-clock"></i></div>
                <div class="card-info">
                    <h3>Sync Status</h3>
                    <p id="sync-time" style="font-size: 1.1rem !important; font-weight: normal;">Fetching Data...</p>
                </div>
            </div>

        </section>

        <!-- الشارت -->
        <section class="chart-container">
            <div class="chart-header">
                <h3><i class="fa-solid fa-chart-area gold-text"></i> Fund Performance Growth</h3>
                <span class="badge">Live Analytics</span>
            </div>
            <div class="chart-wrapper">
                <canvas id="performanceChart"></canvas>
            </div>
        </section>

    </div>

    <script>
        if (localStorage.getItem('mocha_auth') !== 'true') {
            window.location.href = 'index.html';
        }
        function handleLogout() {
            localStorage.removeItem('mocha_auth');
            window.location.href = 'index.html';
        }

        const SHEET_URL = "https://docs.google.com/spreadsheets/d/11-u2UCKiW1VmYhm3X8MhD_f4PhyfdXi0DtJG41zdHT8/gviz/tq?tqx=out:json&sheet=Sheet2";

        document.addEventListener("DOMContentLoaded", () => {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const goldGradient = ctx.createLinearGradient(0, 0, 0, 300);
            goldGradient.addColorStop(0, 'rgba(212, 175, 55, 0.3)');
            goldGradient.addColorStop(1, 'rgba(212, 175, 55, 0.0)');

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Fund Growth (Gold)',
                        data: [10, 20, 30, 45, 60, 80, 100],
                        borderColor: '#d4af37',
                        borderWidth: 3,
                        pointBackgroundColor: '#d4af37',
                        backgroundColor: goldGradient,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#a1a1a6' } },
                        y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#a1a1a6' } }
                    }
                }
            });

            fetchLiveSheetData();
        });

        async function fetchLiveSheetData() {
            let totalRevenues = 44.00;
            let totalExpenses = 138.66;
            let liveInvestors = 0; // القيمة الافتراضية صفر لحين القراءة الإيجابية

            try {
                const response = await fetch(SHEET_URL + '&nocache=' + new Date().getTime());
                const text = await response.text();
                
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;

                if (rows && rows.length > 0) {
                    let tempRev = 0;
                    let tempExp = 0;

                    // 🛠️ التعديل السحري هنا: قراءة الخلية E2 برمجياً تعني rows[0].c[4]
                    if (rows[0] && rows[0].c && rows[0].c[4]) {
                        let invVal = parseInt(rows[0].c[4].v);
                        if (!isNaN(invVal)) liveInvestors = invVal;
                    }

                    for (let i = 0; i < rows.length; i++) {
                        const row = rows[i];
                        if (row && row.c) {
                            let revVal = row.c[1] ? parseFloat(row.c[1].v) : 0;
                            let expVal = row.c[2] ? parseFloat(row.c[2].v) : 0;

                            if (!isNaN(revVal)) tempRev += revVal;
                            if (!isNaN(expVal)) tempExp += expVal;
                        }
                    }
                    
                    if(tempRev > 0 || tempExp > 0) {
                        totalRevenues = tempRev;
                        totalExpenses = tempExp;
                    }
                }

            } catch (error) {
                console.error("Using fallback data:", error);
            }

            const totalProfits = totalRevenues - totalExpenses;
            const shareProfit = totalProfits / 120;
            const netShareProfit = shareProfit * 0.93; 

            const timeString = new Date().toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });
            document.getElementById("sync-time").innerText = "Synced: " + timeString;
            document.getElementById("last-update").innerText = "🔄 Updated " + timeString;

            animateCurrency(document.getElementById("total-profits"), totalProfits);
            animateCurrency(document.getElementById("revenues"), totalRevenues);
            animateCurrency(document.getElementById("expenses"), totalExpenses);
            animateValue(document.getElementById("investors-count"), 0, liveInvestors, 1000); 
            
            animateCurrency(document.getElementById("share-value"), 30); 
            animateCurrency(document.getElementById("share-profit"), shareProfit); 
            animateCurrency(document.getElementById("net-share-profit"), netShareProfit); 

            window.myChart.data.datasets[0].data = [totalRevenues * 0.2, totalRevenues * 0.6, totalProfits];
            window.myChart.update();
        }

        function animateCurrency(element, targetValue) {
            if(!element) return;
            let startTimestamp = null;
            const duration = 1200;
            function step(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentValue = progress * targetValue;
                
                if (currentValue < 0) {
                    element.innerText = "-" + Math.abs(currentValue).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,') + " Gold";
                } else {
                    element.innerText = currentValue.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,') + " Gold";
                }
                if (progress < 1) window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
        }

        function animateValue(obj, start, end, duration) {
            if(!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
