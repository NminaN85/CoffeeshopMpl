    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Enterprise | Financial Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="dashboard-container">
        
        <header class="dash-header">
            <div class="brand">
                <i class="fa-solid fa-crown gold-text"></i>
                <div class="brand-text">
                    <h2>MOCHA HUB</h2>
                    <span id="last-update">🔄 System Initializing...</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="notification-bell">
                    <i class="fa-solid fa-bell"></i>
                    <span class="bell-dot"></span>
                </div>
                <button onclick="handleLogout()" class="btn-logout">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </header>

        <section class="metrics-grid">
            
            <div class="metric-card premium-glow">
                <div class="card-icon"><i class="fa-solid fa-chart-line-up"></i></div>
                <div class="card-info">
                    <h3>Total Profits</h3>
                    <p class="counter" id="total-profits">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon success"><i class="fa-solid fa-wallet"></i></div>
                <div class="card-info">
                    <h3>Revenues</h3>
                    <p class="counter" id="revenues">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon danger"><i class="fa-solid fa-receipt"></i></div>
                <div class="card-info">
                    <h3>Expenses</h3>
                    <p class="counter" id="expenses">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon info"><i class="fa-solid fa-users"></i></div>
                <div class="card-info">
                    <h3>Investors</h3>
                    <p class="counter-pure" id="investors-count">0</p>
                </div>
            </div>

            <div class="metric-card share-value-card">
                <div class="card-icon gold"><i class="fa-solid fa-gem"></i></div>
                <div class="card-info">
                    <h3>Share Value</h3>
                    <p class="counter" id="share-value">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon"><i class="fa-solid fa-calendar-week"></i></div>
                <div class="card-info">
                    <h3>Weekly Profit</h3>
                    <p class="counter" id="weekly-profit">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon"><i class="fa-solid fa-calendar-days"></i></div>
                <div class="card-info">
                    <h3>Monthly Profit</h3>
                    <p class="counter" id="monthly-profit">€0.00</p>
                </div>
            </div>

            <div class="metric-card timestamp-card">
                <div class="card-icon"><i class="fa-solid fa-clock"></i></div>
                <div class="card-info">
                    <h3>Sync Status</h3>
                    <p id="sync-time">Fetching Data...</p>
                </div>
            </div>

            <div class="metric-card alert-card">
                <div class="card-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
                <div class="card-info">
                    <h3>System Alert</h3>
                    <p id="system-alert">HTML Web Scraping Engine Active.</p>
                </div>
            </div>

        </section>

        <section class="chart-container">
            <div class="chart-header">
                <h3><i class="fa-solid fa-chart-area gold-text"></i> Fund Performance Growth</h3>
                <span class="badge">Live Analytics</span>
            </div>
            <div class="chart-wrapper">
                <canvas id="performanceChart"></canvas>
            </div>
        </section>

    </div>

        // 1. حماية البوابة وتحقق تسجيل الدخول
        if (localStorage.getItem('mocha_auth') !== 'true') {
            window.location.href = 'index.html';
        }
        function handleLogout() {
            localStorage.removeItem('mocha_auth');
            window.location.href = 'index.html';
        }
