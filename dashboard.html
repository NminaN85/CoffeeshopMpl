<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Enterprise | Financial Dashboard</title>
    <!-- Font Awesome الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة الرسوم البيانية Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- ملفات الـ CSS -->
    <link rel="stylesheet" href="assets/css/style.css"> <!-- الستايل العام -->
    <link rel="stylesheet" href="assets/css/dashboard.css"> <!-- ستايل لوحة التحكم -->
</head>
<body>

    <!-- 🌌 خلفية زجاجية ممتدة -->
    <div class="bg-overlay"></div>

    <div class="dashboard-container">
        
        <!-- 📱 الهيدر العالي (Top Navigation) -->
        <header class="dash-header">
            <div class="brand">
                <i class="fa-solid fa-crown gold-text"></i>
                <div class="brand-text">
                    <h2>MOCHA HUB</h2>
                    <span id="last-update">🔄 System Initializing...</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="notification-bell">
                    <i class="fa-solid fa-bell"></i>
                    <span class="bell-dot"></span>
                </div>
                <button onclick="handleLogout()" class="btn-logout">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </header>

        <!-- 📊 شبكة الكروت الـ 9 الاحترافية (The Grid) -->
        <section class="metrics-grid">
            
            <!-- 1. إجمالي الأرباح -->
            <div class="metric-card premium-glow">
                <div class="card-icon"><i class="fa-solid fa-chart-line-up"></i></div>
                <div class="card-info">
                    <h3>Total Profits</h3>
                    <p class="counter" id="total-profits">€0.00</p>
                </div>
            </div>

            <!-- 2. الإيرادات -->
            <div class="metric-card">
                <div class="card-icon success"><i class="fa-solid fa-wallet"></i></div>
                <div class="card-info">
                    <h3>Revenues</h3>
                    <p class="counter" id="revenues">€0.00</p>
                </div>
            </div>

            <!-- 3. المصروفات -->
            <div class="metric-card">
                <div class="card-icon danger"><i class="fa-solid fa-receipt"></i></div>
                <div class="card-info">
                    <h3>Expenses</h3>
                    <p class="counter" id="expenses">€0.00</p>
                </div>
            </div>

            <!-- 4. عدد المستثمرين -->
            <div class="metric-card">
                <div class="card-icon info"><i class="fa-solid fa-users"></i></div>
                <div class="card-info">
                    <h3>Investors</h3>
                    <p class="counter-pure" id="investors-count">0</p>
                </div>
            </div>

            <!-- 5. قيمة السهم -->
            <div class="metric-card share-value-card">
                <div class="card-icon gold"><i class="fa-solid fa-gem"></i></div>
                <div class="card-info">
                    <h3>Share Value</h3>
                    <p class="counter" id="share-value">€0.00</p>
                </div>
            </div>

            <!-- 6. أرباح هذا الأسبوع -->
            <div class="metric-card">
                <div class="card-icon"><i class="fa-solid fa-calendar-week"></i></div>
                <div class="card-info">
                    <h3>Weekly Profit</h3>
                    <p class="counter" id="weekly-profit">€0.00</p>
                </div>
            </div>

            <!-- 7. أرباح هذا الشهر -->
            <div class="metric-card">
                <div class="card-icon"><i class="fa-solid fa-calendar-days"></i></div>
                <div class="card-info">
                    <h3>Monthly Profit</h3>
                    <p class="counter" id="monthly-profit">€0.00</p>
                </div>
            </div>

            <!-- 8. آخر تحديث (كارت فرعي لعرض التوقيت بدقة) -->
            <div class="metric-card timestamp-card">
                <div class="card-icon"><i class="fa-solid fa-clock"></i></div>
                <div class="card-info">
                    <h3>Sync Status</h3>
                    <p id="sync-time">Fetching Data...</p>
                </div>
            </div>

            <!-- 9. الإشعار/حالة النظام -->
            <div class="metric-card alert-card">
                <div class="card-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
                <div class="card-info">
                    <h3>System Alert</h3>
                    <p id="system-alert">All systems stable. Payouts secure.</p>
                </div>
            </div>

        </section>

        <!-- 📈 قسم الرسوم البيانية الفاخرة (Charts Section) -->
        <section class="chart-container">
            <div class="chart-header">
                <h3><i class="fa-solid fa-chart-area gold-text"></i> Fund Performance Growth</h3>
                <span class="badge">Live Analytics</span>
            </div>
            <div class="chart-wrapper">
                <canvas id="performanceChart"></canvas>
            </div>
        </section>

    </div>

    <!-- جافا سكريبت الأمان واللوحة -->
    <script>
        // حماية الصفحة: لو مش مسجل دخول يرجعه لـ index.html فوراً
        if (localStorage.getItem('mocha_auth') !== 'true') {
            window.location.href = 'index.html';
        }
        function handleLogout() {
            localStorage.removeItem('mocha_auth');
            window.location.href = 'index.html';
        }
    </script>
        <!-- ⬇️ كود التشغيل المدمج لمنع كاش المتصفح ⬇️ -->
    <script>
        // 1. حماية البوابة
        if (localStorage.getItem('mocha_auth') !== 'true') {
            window.location.href = 'index.html';
        }
        function handleLogout() {
            localStorage.removeItem('mocha_auth');
            window.location.href = 'index.html';
        }

        // 🔗 رابط جدولك المباشر
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/11-u2UCKiW1VmYhm3X8MhD_f4PhyfdXi0DtJG41zdHT8/export?format=csv&gid=1116639595";

        document.addEventListener("DOMContentLoaded", () => {
            // 2. بناء الرسم البياني
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const goldGradient = ctx.createLinearGradient(0, 0, 0, 300);
            goldGradient.addColorStop(0, 'rgba(212, 175, 55, 0.3)');
            goldGradient.addColorStop(1, 'rgba(212, 175, 55, 0.0)');

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Fund Growth (€)',
                        data: [0, 0, 0, 0, 0, 0, 0], // سيبدأ بصفر ويتحدث
                        borderColor: '#d4af37',
                        borderWidth: 3,
                        pointBackgroundColor: '#d4af37',
                        backgroundColor: goldGradient,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#a1a1a6' } },
                        y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#a1a1a6' } }
                    }
                }
            });

            // 3. استدعاء الداتا الحقيقية فوراً
            fetchLiveSheetData();
        });

        // 4. دالة جلب البيانات والعمليات الحسابية
        async function fetchLiveSheetData() {
            try {
                const response = await fetch(SHEET_URL + '&nocache=' + new Date().getTime()); // كسر الكاش
                const dataText = await response.text();
                
                const rows = dataText.split("\n").map(row => row.split(","));
                
                let totalRevenues = 0;
                let totalExpenses = 0;

                // جمع الخلايا
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row && row.length >= 3) {
                        const revVal = parseFloat(row[1]?.replace(/[^0-9.-]/g, ""));
                        const expVal = parseFloat(row[2]?.replace(/[^0-9.-]/g, ""));

                        if (!isNaN(revVal)) totalRevenues += revVal;
                        if (!isNaN(expVal)) totalExpenses += expVal;
                    }
                }

                const totalProfits = totalRevenues - totalExpenses;

                // تحديث الشاشة
                const timeString = new Date().toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });
                
                animateCurrency(document.getElementById("total-profits"), totalProfits);
                animateCurrency(document.getElementById("revenues"), totalRevenues);
                animateCurrency(document.getElementById("expenses"), totalExpenses);
                animateCurrency(document.getElementById("share-value"), 1.25);
                animateCurrency(document.getElementById("weekly-profit"), totalProfits);
                animateCurrency(document.getElementById("monthly-profit"), totalProfits);
                animateValue(document.getElementById("investors-count"), 0, 42, 1500);

                document.getElementById("sync-time").innerText = "Synced: " + timeString + " (Live)";
                document.getElementById("last-update").innerText = "🔄 Updated " + timeString;
                
                // تحديث بيانات الشارت بأرقام حقيقية تقريبية تصاعدية بناءً على أرباحك
                window.myChart.data.datasets[0].data = [
                    totalRevenues * 0.2, 
                    totalRevenues * 0.4, 
                    totalRevenues * 0.5, 
                    totalRevenues * 0.7, 
                    totalRevenues * 0.8, 
                    totalRevenues * 0.9, 
                    totalProfits
                ];
                window.myChart.update();

            } catch (error) {
                console.error("Error:", error);
                document.getElementById("sync-time").innerText = "⚠️ Connection Error";
            }
        }

        // دالة العدادات
        function animateCurrency(element, targetValue) {
            if(!element) return;
            let startTimestamp = null;
            const duration = 1500;
            function step(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentValue = progress * targetValue;
                element.innerText = "€" + currentValue.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
                if (progress < 1) window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
        }

        function animateValue(obj, start, end, duration) {
            if(!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
    </script>

</body>
</html>
