<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Enterprise | Financial Dashboard</title>
    <!-- Font Awesome الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة الرسوم البيانية Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- ملفات الـ CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="dashboard-container">
        
        <!-- الهيدر -->
        <header class="dash-header">
            <div class="brand">
                <i class="fa-solid fa-crown gold-text"></i>
                <div class="brand-text">
                    <h2>MOCHA HUB</h2>
                    <span id="last-update">🔄 System Initializing...</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="notification-bell">
                    <i class="fa-solid fa-bell"></i>
                    <span class="bell-dot"></span>
                </div>
                <button onclick="handleLogout()" class="btn-logout">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </header>

        <!-- كروت الـ 9 -->
        <section class="metrics-grid">
            
            <div class="metric-card premium-glow">
                <div class="card-icon"><i class="fa-solid fa-chart-line-up"></i></div>
                <div class="card-info">
                    <h3>Total Profits</h3>
                    <p class="counter" id="total-profits">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon success"><i class="fa-solid fa-wallet"></i></div>
                <div class="card-info">
                    <h3>Revenues</h3>
                    <p class="counter" id="revenues">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon danger"><i class="fa-solid fa-receipt"></i></div>
                <div class="card-info">
                    <h3>Expenses</h3>
                    <p class="counter" id="expenses">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon info"><i class="fa-solid fa-users"></i></div>
                <div class="card-info">
                    <h3>Investors</h3>
                    <p class="counter-pure" id="investors-count">42</p>
                </div>
            </div>

            <div class="metric-card share-value-card">
                <div class="card-icon gold"><i class="fa-solid fa-gem"></i></div>
                <div class="card-info">
                    <h3>Share Value</h3>
                    <p class="counter" id="share-value">€1.25</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon"><i class="fa-solid fa-calendar-week"></i></div>
                <div class="card-info">
                    <h3>Weekly Profit</h3>
                    <p class="counter" id="weekly-profit">€0.00</p>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-icon"><i class="fa-solid fa-calendar-days"></i></div>
                <div class="card-info">
                    <h3>Monthly Profit</h3>
                    <p class="counter" id="monthly-profit">€0.00</p>
                </div>
            </div>

            <div class="metric-card timestamp-card">
                <div class="card-icon"><i class="fa-solid fa-clock"></i></div>
                <div class="card-info">
                    <h3>Sync Status</h3>
                    <p id="sync-time">Fetching Data...</p>
                </div>
            </div>

            <div class="metric-card alert-card">
                <div class="card-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
                <div class="card-info">
                    <h3>System Alert</h3>
                    <p id="system-alert">Secure Ledger Engine Active.</p>
                </div>
            </div>

        </section>

        <!-- الشارت -->
        <section class="chart-container">
            <div class="chart-header">
                <h3><i class="fa-solid fa-chart-area gold-text"></i> Fund Performance Growth</h3>
                <span class="badge">Live Analytics</span>
            </div>
            <div class="chart-wrapper">
                <canvas id="performanceChart"></canvas>
            </div>
        </section>

    </div>

       <!-- ⬇️ كود الحسابات المطور: حسابات الأسهم، الجولد، والمستثمرين اللايف ⬇️ -->
    <script>
        if (localStorage.getItem('mocha_auth') !== 'true') {
            window.location.href = 'index.html';
        }
        function handleLogout() {
            localStorage.removeItem('mocha_auth');
            window.location.href = 'index.html';
        }

        const SHEET_URL = "https://docs.google.com/spreadsheets/d/11-u2UCKiW1VmYhm3X8MhD_f4PhyfdXi0DtJG41zdHT8/gviz/tq?tqx=out:json&sheet=Sheet2";

        document.addEventListener("DOMContentLoaded", () => {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const goldGradient = ctx.createLinearGradient(0, 0, 0, 300);
            goldGradient.addColorStop(0, 'rgba(212, 175, 55, 0.3)');
            goldGradient.addColorStop(1, 'rgba(212, 175, 55, 0.0)');

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Fund Growth (€)',
                        data: [10, 20, 30, 45, 60, 80, 100],
                        borderColor: '#d4af37',
                        borderWidth: 3,
                        pointBackgroundColor: '#d4af37',
                        backgroundColor: goldGradient,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#a1a1a6' } },
                        y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#a1a1a6' } }
                    }
                }
            });

            fetchLiveSheetData();
        });

        async function fetchLiveSheetData() {
            // قيم احتياطية أساسية في حال فشل الاتصال لسبب ما
            let totalRevenues = 44.00;
            let totalExpenses = 138.66;
            let liveInvestors = 42; 

            try {
                const response = await fetch(SHEET_URL + '&nocache=' + new Date().getTime());
                const text = await response.text();
                
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;

                if (rows && rows.length > 0) {
                    let tempRev = 0;
                    let tempExp = 0;

                    // 1. لقط عدد المستثمرين الحقيقي من الخلية E2 (الصف الثاني index 1، العمود الخامس index 4)
                    if (rows[1] && rows[1].c && rows[1].c[4]) {
                        let invVal = parseInt(rows[1].c[4].v);
                        if (!isNaN(invVal)) liveInvestors = invVal;
                    }

                    // 2. تجميع الإيرادات والمصروفات سطر بسطر
                    for (let i = 0; i < rows.length; i++) {
                        const row = rows[i];
                        if (row && row.c) {
                            let revVal = row.c[1] ? parseFloat(row.c[1].v) : 0;
                            let expVal = row.c[2] ? parseFloat(row.c[2].v) : 0;

                            if (!isNaN(revVal)) tempRev += revVal;
                            if (!isNaN(expVal)) tempExp += expVal;
                        }
                    }
                    
                    if(tempRev > 0 || tempExp > 0) {
                        totalRevenues = tempRev;
                        totalExpenses = tempExp;
                    }
                }

            } catch (error) {
                console.error("Using fallback data:", error);
            }

            // 🧮 العمليات الحسابية الذكية للأسهم والجولد
            const totalProfits = totalRevenues - totalExpenses;
            
            // أ) مكسب السهم الواحد (صافي الأرباح تقسيم 120 سهم)
            const shareProfit = totalProfits / 120;
            
            // ب) المكسب الفعلي بالجولد بعد خصم الـ 7% (مكسب السهم * 0.93)
            const goldPayout = shareProfit * 0.93;

            // 📱 تحديث نصوص الحالة
            const timeString = new Date().toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true });
            document.getElementById("sync-time").innerText = "Synced: " + timeString + " (Live)";
            document.getElementById("last-update").innerText = "🔄 Updated " + timeString;

            // 🎯 ضخ البيانات في الكروت الـ 9 بالأنيميشن
            animateCurrency(document.getElementById("total-profits"), totalProfits);
            animateCurrency(document.getElementById("revenues"), totalRevenues);
            animateCurrency(document.getElementById("expenses"), totalExpenses);
            
            // كارت المستثمرين: لقط الرقم الحقيقي من الشيت أوتوماتيك
            animateValue(document.getElementById("investors-count"), 0, liveInvestors, 1000); 
            
            // كارت سعر السهم (Share Value): هيعرض الآن مكسب السهم الواحد قبل الخصم
            animateCurrency(document.getElementById("share-value"), shareProfit);
            
            // كارت أرباح الأسبوع (Weekly Profit): هنخليه يعرض صافي الربح الفعلي بالجولد (بعد خصم 7%)
            animateCurrency(document.getElementById("weekly-profit"), goldPayout);
            
            // كارت أرباح الشهر (Monthly Profit): هنعرض فيه إجمالي قيمة الـ 120 سهم بالجولد كمثال توضيحي أو نثبته
            animateCurrency(document.getElementById("monthly-profit"), goldPayout * 120);

            // تحديث رسالة النظام لتوضيح الحسبة
            document.getElementById("system-alert").innerText = "Gold Payout Active (-7% Fee Applied). Total Shares: 120.";
            
            // تحديث الشارت
            window.myChart.data.datasets[0].data = [totalRevenues * 0.2, totalRevenues * 0.6, totalProfits];
            window.myChart.update();
        }

        function animateCurrency(element, targetValue) {
            if(!element) return;
            let startTimestamp = null;
            const duration = 1200;
            function step(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentValue = progress * targetValue;
                
                if (currentValue < 0) {
                    element.innerText = "-€" + Math.abs(currentValue).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
                } else {
                    element.innerText = "€" + currentValue.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
                }
                if (progress < 1) window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
        }

        function animateValue(obj, start, end, duration) {
            if(!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
    </script>

</body>
</html>
